<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="nrMarkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4B6B88"/>
      <stop offset="100%" stop-color="#6088AE"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(165,60)">
    <rect width="70" height="70" rx="18" fill="url(#nrMarkGrad)"/>
    <rect x="14" y="14" width="42" height="42" rx="8" fill="#0B0D10"/>
    <circle cx="35" cy="35" r="6" fill="#F4F6F8"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="195"
        text-anchor="middle"
        font-family="'Helvetica Neue','Helvetica','Arial',sans-serif"
        font-weight="700"
        font-size="34"
        letter-spacing="8"
        fill="#F4F6F8">NOVA RIDE</text>

  <!-- Tagline -->
  <text x="200" y="228"
        text-anchor="middle"
        font-family="'Helvetica Neue','Helvetica','Arial',sans-serif"
        font-weight="400"
        font-size="11"
        letter-spacing="4"
        fill="#6088AE"
        opacity="0.9">TRANSPORT PRIVÉ</text>
</svg>
