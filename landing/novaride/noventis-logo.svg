<svg xmlns="http://www.w3.org/2000/svg" viewBox="93 128 160 54" width="160" height="54">
  <defs>
    <linearGradient id="grad-nv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c3de8"/>
      <stop offset="50%" stop-color="#8b5fff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="grad-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#c8d6e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="grad-silver-wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#eef3f8"/>
      <stop offset="48%" stop-color="#c8d6e5"/>
      <stop offset="55%" stop-color="#dde4ec"/>
      <stop offset="100%" stop-color="#8b98a8"/>
    </linearGradient>
    <filter id="glow-nv" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo centré dans un canvas 400x300 -->
  <g transform="translate(95, 130)">
    <g transform="scale(1.4)">
      <!-- N shape avec gradient violet-cyan -->
      <g transform="translate(2, 4)">
        <rect x="1" y="1" width="30" height="30" rx="7"
              fill="none" stroke="url(#grad-nv)" stroke-width="1.3" opacity="0.95"/>
        <path d="M 8 23 L 8 9 L 24 23 L 24 9"
              fill="none" stroke="url(#grad-nv)" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"
              filter="url(#glow-nv)"/>
        <path d="M 8 23 L 8 9 L 24 23 L 24 9"
              fill="none" stroke="url(#grad-silver)" stroke-width="1"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
        <circle cx="28" cy="7" r="1.2" fill="url(#grad-nv)"/>
      </g>
      <!-- Wordmark "Noventis" + "design" -->
      <g transform="translate(44, 0)">
        <text x="0" y="20"
              font-family="Space Grotesk, Inter, sans-serif"
              font-size="17" font-weight="500" letter-spacing="-0.4"
              fill="url(#grad-silver-wordmark)">Noventis</text>
        <text x="0" y="20"
              font-family="Space Grotesk, Inter, sans-serif"
              font-size="17" font-weight="500" letter-spacing="-0.4"
              fill="#ffffff" opacity="0.18">Noventis</text>
        <text x="32" y="33"
              font-family="Space Grotesk, Inter, sans-serif"
              font-size="8.5" font-weight="500" letter-spacing="2.2"
              text-anchor="middle" fill="#a8b0c0" opacity="0.9">design</text>
      </g>
    </g>
  </g>
</svg>
